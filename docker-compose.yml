services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-os-api
    ports:
      - "8000:8000"
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    # Volumes mapping is helpful if you want code changes to reflect inside the container instantly
    volumes:
      - .:/app
      - /app/node_modules
    # Lets the container reach services on the host (e.g. a local Ollama instance
    # on port 11434) via host.docker.internal — not automatic on native Linux Docker.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - postgres
      - tts
      - llama-cpp
      - whisper-cpp

  # Offline-first local inference: serves a GGUF model you already have on
  # disk over an OpenAI-compatible API, entirely inside the Docker network —
  # no host-networking/bind-address dependency the way a host-run Ollama has
  # (see README's "Local LLM chat" note). Gemini stays fully optional.
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: jarvis-llama-cpp
    volumes:
      - ${HOST_MODEL_DIR}:/models:ro
    command: ["-m", "/models/${LOCAL_MODEL_FILE}", "--host", "0.0.0.0", "--port", "8080", "-c", "4096"]
    restart: unless-stopped

  # Offline-first speech-to-text, mirroring the llama-cpp pattern above: a
  # real ggml model (a genuine ~142MB whisper-base.en, not a stub) is already
  # baked into this image, so no extra host download/volume is needed the way
  # the LLM model requires. --convert uses the image's bundled ffmpeg to
  # accept whatever format the browser's MediaRecorder sends (webm/opus)
  # instead of requiring pre-converted WAV.
  whisper-cpp:
    image: ghcr.io/ggml-org/whisper.cpp:main
    container_name: jarvis-whisper-cpp
    entrypoint: ["/app/build/bin/whisper-server"]
    command: ["--host", "0.0.0.0", "--port", "8081", "-m", "/app/models/ggml-base.en.bin", "--convert"]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /mnt/jarvis_home/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  tts:
    image: travisvn/openai-edge-tts:latest
    container_name: jarvis-tts
    environment:
      - API_KEY=${TTS_API_KEY}
    ports:
      - "5051:5050"
    restart: unless-stopped
