services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-os-api
    ports:
      - "8000:8000"
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    # Volumes mapping is helpful if you want code changes to reflect inside the container instantly
    volumes:
      - .:/app
      - /app/node_modules
      # A single dedicated folder for Jarvis's file/notes tool — nothing
      # outside it is ever reachable (see src/integrations/files.ts). Kept
      # as its own mount, not nested under /app, so it's clearly separate
      # from the repo itself.
      - ${JARVIS_FILES_DIR}:/jarvis-files
    # Lets the container reach services on the host (e.g. a local Ollama instance
    # on port 11434) via host.docker.internal — not automatic on native Linux Docker.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - postgres
      - tts
      - llama-cpp
      - whisper-cpp

  # Offline-first local inference: serves a GGUF model you already have on
  # disk over an OpenAI-compatible API, entirely inside the Docker network —
  # no host-networking/bind-address dependency the way a host-run Ollama has
  # (see README's "Local LLM chat" note). Gemini stays fully optional.
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: jarvis-llama-cpp
    volumes:
      - ${HOST_MODEL_DIR}:/models:ro
    command: ["-m", "/models/${LOCAL_MODEL_FILE}", "--host", "0.0.0.0", "--port", "8080", "-c", "4096"]
    restart: unless-stopped

  # Offline-first speech-to-text, mirroring the llama-cpp pattern above: a
  # real ggml model (a genuine ~142MB whisper-base.en, not a stub) is already
  # baked into this image, so no extra host download/volume is needed the way
  # the LLM model requires. --convert uses the image's bundled ffmpeg to
  # accept whatever format the browser's MediaRecorder sends (webm/opus)
  # instead of requiring pre-converted WAV.
  whisper-cpp:
    image: ghcr.io/ggml-org/whisper.cpp:main
    container_name: jarvis-whisper-cpp
    entrypoint: ["/app/build/bin/whisper-server"]
    command: ["--host", "0.0.0.0", "--port", "8081", "-m", "/app/models/ggml-base.en.bin", "--convert"]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /mnt/jarvis_home/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  tts:
    image: travisvn/openai-edge-tts:latest
    container_name: jarvis-tts
    environment:
      - API_KEY=${TTS_API_KEY}
    ports:
      - "5051:5050"
    restart: unless-stopped

  # Home automation hub — the local-only integration point for physical home
  # security (ONVIF/RTSP cameras, door/window sensors, locks) instead of
  # Jarvis integrating with each vendor's cloud API separately. Nothing here
  # ever leaves the LAN: no port forwarding, no Home Assistant Cloud/Nabu
  # Casa subscription, cameras stream directly to this container over
  # RTSP/ONVIF rather than through a manufacturer's servers. network_mode:
  # host is Home Assistant's own documented setup (explicitly chosen over
  # the isolated-bridge alternative) — it needs real LAN presence for
  # mDNS/SSDP/ONVIF device discovery, which a normal Docker bridge network
  # wouldn't pass through. This container never receives untrusted chat
  # input directly and has its own separate login — a different exposure
  # profile than the api service, which deliberately avoids this same access.
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: jarvis-homeassistant
    network_mode: host
    volumes:
      - /mnt/jarvis_home/homeassistant_config:/config
    environment:
      - TZ=${TZ:-UTC}
    restart: unless-stopped
