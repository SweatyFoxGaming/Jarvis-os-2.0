<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis OS · Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#040711',
                        surface: '#0A0F1D',
                        card: '#10172A',
                        primary: '#38BDF8',
                        accent: '#818CF8',
                        success: '#34D399',
                        warning: '#FBBF24',
                        danger: '#F87171',
                        text: '#F1F5F9',
                        secondary: '#475569'
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #040711; }
        .status.connecting { color: #FBBF24; }
        .status.live { color: #34D399; }
        .status.error { color: #F87171; }
        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.08); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-text font-sans">
    <div class="max-w-md w-full px-6 text-center">
        <h1 class="text-2xl font-semibold mb-2">Voice-native Jarvis</h1>
        <p class="text-secondary text-sm mb-8">
            A continuous, real-time voice conversation via Gemini's Live API —
            not a record-and-wait round trip. Requires <code>GEMINI_API_KEY</code>
            to be configured on the server.
        </p>

        <div class="flex justify-center mb-8">
            <button id="voice-toggle"
                class="w-24 h-24 rounded-full bg-primary/20 border-2 border-primary flex items-center justify-center text-4xl transition-all hover:bg-primary/30">
                🎙️
            </button>
        </div>

        <div id="voice-status" class="status text-sm mb-4">Not connected.</div>

        <a href="/" class="text-secondary text-xs hover:text-primary">← Back to console</a>
    </div>

    <script type="module">
        import { startVoiceSession, stopVoiceSession } from "/js/voice.js";

        const toggleBtn = document.getElementById("voice-toggle");
        let running = false;

        toggleBtn.addEventListener("click", async () => {
            if (running) {
                stopVoiceSession();
                toggleBtn.classList.remove("pulse-ring", "bg-danger/20", "border-danger");
                toggleBtn.classList.add("bg-primary/20", "border-primary");
                running = false;
            } else {
                await startVoiceSession();
                toggleBtn.classList.add("pulse-ring", "bg-danger/20", "border-danger");
                toggleBtn.classList.remove("bg-primary/20", "border-primary");
                running = true;
            }
        });
    </script>
</body>
</html>
